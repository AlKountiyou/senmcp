version: "3.9"

services:
  mcp_opendata:
    build:
      context: .
      dockerfile: Dockerfile.opendata
    environment:
      RUN_MODE: "docker"
      MCP_HTTP_HOST: "0.0.0.0"
      MCP_HTTP_PORT: "8000"
      MCP_HTTP_PATH: "/mcp"
    ports:
      - "8001:8000"

  mcp_services:
    build:
      context: .
      dockerfile: Dockerfile.services
    environment:
      RUN_MODE: "docker"
      MCP_HTTP_HOST: "0.0.0.0"
      MCP_HTTP_PORT: "8000"
      MCP_HTTP_PATH: "/mcp"
    ports:
      - "8002:8000"

  agent_app:
    build:
      context: .
      dockerfile: Dockerfile.agent
    environment:
      RUN_MODE: "docker"
      MCP_HTTP_PATH: "/mcp"
    depends_on:
      - mcp_opendata
      - mcp_services

