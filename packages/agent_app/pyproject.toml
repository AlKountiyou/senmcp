[project]
name = "agent-app"
version = "0.1.0"
description = "LangChain/LangGraph agent app and CLI for SenCivic MCP Stack."
requires-python = ">=3.11"
dependencies = [
  "mcp-core==0.1.0",
  "mcp-trust==0.1.0",
  "mcp-opendata==0.1.0",
  "mcp-services==0.1.0",
  "mcp[http]==1.26.0",
  "click<8.2.0",
  "langchain-core==1.0.0",
  "langgraph==1.0.0",
  "langchain-mcp-adapters==0.2.1",
  "typer==0.12.5",
  "httpx==0.27.2",
  "pyyaml==6.0.2",
]

[project.scripts]
sencivic = "agent_app.main:app"

